name: Auth Service Tests

on:
  push:
    paths:
      - 'auth/src/**'
      - '.github/workflows/auth-test.yml'
  pull_request:
    paths:
      - 'auth/src/**'
      - '.github/workflows/auth-test.yml'

jobs:
  test:
    name: Run Go Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: auth/src/go.mod
          cache-dependency-path: auth/src/go.sum

      - name: Download dependencies
        working-directory: auth/src
        run: go mod download

      - name: Build
        working-directory: auth/src
        run: go build ./...

      - name: Run unit tests (models)
        working-directory: auth/src
        run: go test -v -count=1 -timeout 60s ./models/...

      - name: Run unit tests (services)
        working-directory: auth/src
        run: go test -v -count=1 -timeout 60s ./services/...

      - name: Run unit tests (middlewares)
        working-directory: auth/src
        run: go test -v -count=1 -timeout 60s ./middlewares/...

      - name: Run unit tests (controllers)
        working-directory: auth/src
        run: go test -v -count=1 -timeout 60s ./controllers/...

      - name: Run integration tests
        working-directory: auth/src
        run: go test -v -count=1 -timeout 120s ./integration/...

      - name: Run all tests with coverage
        working-directory: auth/src
        run: go test -count=1 -timeout 180s -coverprofile=coverage.out -covermode=atomic ./...

      - name: Show coverage summary
        working-directory: auth/src
        run: go tool cover -func=coverage.out | tail -1

      - name: Check coverage threshold (50%)
        working-directory: auth/src
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | tail -1 | awk '{print $3}' | sed 's/%//')
          echo "Coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 50" | bc -l) )); then
            echo "❌ Coverage ${COVERAGE}% is below the 50% threshold"
            exit 1
          fi
          echo "✅ Coverage ${COVERAGE}% meets the threshold"

      - name: Generate HTML coverage report
        working-directory: auth/src
        run: go tool cover -html=coverage.out -o coverage.html

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            auth/src/coverage.out
            auth/src/coverage.html
