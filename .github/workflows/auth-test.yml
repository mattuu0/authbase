name: Auth Service Tests

on:
  push:
    paths:
      - 'auth/src/**'
  pull_request:
    paths:
      - 'auth/src/**'

jobs:
  test:
    name: Run Go Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: auth/src/go.mod
          cache-dependency-path: auth/src/go.sum

      - name: Download dependencies
        working-directory: auth/src
        run: go mod download

      - name: Build
        working-directory: auth/src
        run: go build ./...

      - name: Run tests (all layers)
        working-directory: auth/src
        run: go test -v -count=1 -coverprofile=coverage.out -covermode=atomic ./...

      - name: Show coverage summary
        working-directory: auth/src
        run: go tool cover -func=coverage.out | tail -1

      - name: Generate HTML coverage report
        working-directory: auth/src
        run: go tool cover -html=coverage.out -o coverage.html

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            auth/src/coverage.out
            auth/src/coverage.html
