name: Auth Service Tests

on:
  push:
    paths:
      - 'auth/src/**'
  pull_request:
    paths:
      - 'auth/src/**'

jobs:
  test:
    name: Run Go Tests in Docker
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build test image
        run: |
          docker build \
            --target test \
            -t auth-test:latest \
            ./auth

      - name: Run tests and extract coverage
        run: |
          # コンテナを実行してテストとカバレッジ、Markdownレポートを生成
          # test.sh を実行するようにコマンドを変更
          docker run --name auth-test-container auth-test:latest /bin/bash -c "chmod +x test.sh && ./test.sh && go test -v -coverprofile=coverage.out -covermode=atomic ./..."
          
          # 必要なファイルをホスト側にコピー
          docker cp auth-test-container:/root/src/coverage.out ./auth/src/coverage.out
          docker cp auth-test-container:/root/src/TEST_RESULT.md ./auth/src/TEST_RESULT.md
          
          # GitHub Actions の Job Summary にレポートを追加
          cat ./auth/src/TEST_RESULT.md >> $GITHUB_STEP_SUMMARY
          
          # コンテナを削除
          docker rm auth-test-container

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            auth/src/coverage.out
            auth/src/TEST_RESULT.md
