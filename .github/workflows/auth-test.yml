name: Auth Service Tests

on:
  push:
    paths:
      - 'auth/src/**'
  pull_request:
    paths:
      - 'auth/src/**'

jobs:
  test:
    name: Run Go Tests in Docker
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build test image
        run: |
          docker build \
            --target test \
            -t auth-test:latest \
            ./auth

      - name: Run tests and extract coverage
        run: |
          # コンテナを実行してカバレッジファイルを生成
          docker run --name auth-test-container auth-test:latest go test -v -coverprofile=coverage.out -covermode=atomic ./...
          
          # カバレッジファイルをホスト側にコピー
          docker cp auth-test-container:/root/src/coverage.out ./auth/src/coverage.out
          
          # コンテナを削除
          docker rm auth-test-container

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: auth/src/coverage.out
