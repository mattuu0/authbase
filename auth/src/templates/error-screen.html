<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>エラー - AuthBase</title>
    <link rel="stylesheet" href="{{.RelativePath}}public/shared/auth.css">
    <style>
        .err-container {
            background: #fdf2f2;
            border-radius: 16px;
            padding: 16px;
            margin: 24px 0;
            border: 1px solid #f9d7d7;
        }
        .err-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 13px;
            font-family: 'Roboto', sans-serif;
        }
        .err-row:last-child { margin-bottom: 0; }
        .err-key { color: #5f6368; }
        .err-val { font-weight: 500; color: #d93025; font-family: monospace; }
        .foot {
            margin-top: 24px;
            text-align: center;
            font-size: 12px;
            color: var(--text-muted);
        }
    </style>
</head>
<body class="auth-container">
    <div class="auth-card">
        <header class="auth-header">
            <div class="auth-logo-wrapper" style="color:#d93025">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
            </div>
            <h1 class="auth-title">問題が発生しました</h1>
            <p class="auth-subtitle">リクエストの処理中にエラーが起きました</p>
        </header>

        <div class="err-container">
            <div class="err-row">
                <span class="err-key">エラー内容</span>
                <span class="err-val">{{.Error}}</span>
            </div>
            {{if .StatusCode}}
            <div class="err-row">
                <span class="err-key">ステータス</span>
                <span class="err-val">{{.StatusCode}}</span>
            </div>
            {{end}}
            {{if .ErrorID}}
            <div class="err-row">
                <span class="err-key">エラーID</span>
                <span class="err-val">{{.ErrorID}}</span>
            </div>
            {{end}}
        </div>

        <button onclick="window.location.href='{{.RelativePath}}login'" class="btn-outline">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            ログイン画面に戻る
        </button>

        <div class="foot">&copy; 2026 AuthBase</div>
    </div>

    <script src="{{.RelativePath}}public/shared/auth.js"></script>
</body>
</html>
