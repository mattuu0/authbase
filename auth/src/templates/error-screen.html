<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>エラーが発生しました - AuthBase</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

    <div class="fade-in bg-white p-8 rounded-2xl shadow-xl shadow-slate-200 w-full max-w-xl border border-slate-100">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-red-50 rounded-full mb-4 text-red-500">
                <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-slate-800">システムエラーが発生しました</h1>
            <p class="text-slate-500 mt-2">問題が発生しました。ご迷惑をおかけいたします。</p>
        </div>

        <div class="bg-slate-50 rounded-xl p-6 mb-8 border border-slate-100">
            <div class="space-y-4 text-sm">
                <div class="flex flex-col sm:flex-row sm:items-start gap-1 sm:gap-4">
                    <span class="font-semibold text-slate-600 w-32 shrink-0">エラーID:</span>
                    <span id="error-id" class="text-slate-800 font-mono break-all cursor-pointer hover:text-blue-600 transition-colors" title="クリックしてコピー">{{.ErrorID}}</span>
                </div>
                <div class="flex flex-col sm:flex-row sm:items-start gap-1 sm:gap-4">
                    <span class="font-semibold text-slate-600 w-32 shrink-0">HTTPステータス:</span>
                    <span id="http-status" class="text-slate-800 font-mono cursor-pointer hover:text-blue-600 transition-colors" title="クリックしてコピー">{{.StatusCode}}</span>
                </div>
                <div class="flex flex-col sm:flex-row sm:items-start gap-1 sm:gap-4 border-t border-slate-200 pt-4 mt-4">
                    <span class="font-semibold text-slate-600 w-32 shrink-0">エラーメッセージ:</span>
                    <div class="flex-1">
                        <div id="error-message-text" class="text-slate-700 leading-relaxed overflow-hidden transition-all duration-300 max-h-24 whitespace-pre-wrap">{{.Error}}</div>
                        <button id="toggle-message" class="mt-2 text-blue-600 hover:text-blue-700 font-medium hidden">もっと見る</button>
                    </div>
                </div>
            </div>
        </div>

        <div style="display: none;" id="IsPopup">{{.isPopup}}</div>
        
        <div class="flex justify-center">
            <a href="/statics/" id="BackButton" class="inline-flex items-center justify-center bg-slate-800 hover:bg-slate-900 text-white font-semibold py-3 px-8 rounded-xl transition-all duration-200 transform hover:scale-[1.02] active:scale-[0.98]">
                メイン画面に戻る
            </a>
        </div>
    </div>

    <script>
        const messageText = document.getElementById('error-message-text');
        const toggleButton = document.getElementById('toggle-message');
        const BackButton = document.getElementById("BackButton");
        const IsPopup = document.getElementById("IsPopup");

        // ポップアップの判定
        if (IsPopup.textContent === "1") {
            BackButton.textContent = "閉じる";
        }

        BackButton.addEventListener("click", function (evt) {
            if (IsPopup.textContent === "1") {
                evt.preventDefault();
                window.close();
            }
        });

        // エラーメッセージの展開制御
        if (messageText.scrollHeight > 96) { // 96px = 6rem (max-h-24)
            toggleButton.classList.remove('hidden');
        }

        toggleButton.addEventListener('click', () => {
            if (messageText.style.maxHeight === 'none') {
                messageText.style.maxHeight = '6rem';
                toggleButton.textContent = 'もっと見る';
            } else {
                messageText.style.maxHeight = 'none';
                toggleButton.textContent = '隠す';
            }
        });

        // コピー機能
        const setupCopy = (el) => {
            el.addEventListener('click', async () => {
                try {
                    await navigator.clipboard.writeText(el.textContent.trim());
                    const originalText = el.textContent;
                    el.textContent = 'Copied!';
                    el.classList.add('text-green-600');
                    setTimeout(() => {
                        el.textContent = originalText;
                        el.classList.remove('text-green-600');
                    }, 1000);
                } catch (err) {
                    console.error('Failed to copy:', err);
                }
            });
        };

        setupCopy(document.getElementById('error-id'));
        setupCopy(document.getElementById('http-status'));
    </script>
</body>
</html>
