<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>エラー - AuthBase</title>
    <!-- 相対パス。深さが変わる場合は個別の対応が必要だが、一般的に./で試行 -->
    <link rel="stylesheet" href="{{.RelativePath}}public/shared/auth.css">
    <style>
        .error-details {
            background: rgba(241, 245, 249, 0.5);
            border-radius: 1.5rem;
            padding: 1.5rem;
            margin: 2rem 0;
            text-align: left;
        }

        .detail-item {
            display: flex;
            gap: 1rem;
            margin-bottom: 0.75rem;
            font-size: 0.875rem;
        }

        .detail-label {
            font-weight: 800;
            color: var(--text-muted);
            width: 8rem;
            flex-shrink: 0;
        }

        .detail-value {
            font-family: monospace;
            color: #ef4444;
            word-break: break-all;
        }
    </style>
</head>

<body class="auth-container">
    <div class="auth-card" style="max-width: 32rem;">
        <header class="auth-header">
            <div class="auth-logo-wrapper" style="background-color: #ef4444;">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z">
                    </path>
                    <line x1="12" y1="9" x2="12" y2="13"></line>
                    <line x1="12" y1="17" x2="12.01" y2="17"></line>
                </svg>
            </div>
            <h1 class="auth-title">問題が発生しました</h1>
            <p class="auth-subtitle">リクエストの処理中にエラーが発生しました</p>
        </header>

        <div class="error-details">
            <div class="detail-item">
                <span class="detail-label">エラーメッセージ:</span>
                <span class="detail-value">{{.Error}}</span>
            </div>
            {{if .StatusCode}}
            <div class="detail-item">
                <span class="detail-label">ステータス:</span>
                <span class="detail-value">{{.StatusCode}}</span>
            </div>
            {{end}}
            {{if .ErrorID}}
            <div class="detail-item">
                <span class="detail-label">エラーID:</span>
                <span class="detail-value">{{.ErrorID}}</span>
            </div>
            {{end}}
        </div>

        <div style="display: none;" id="IsPopup">{{.isPopup}}</div>

        <button onclick="window.location.href='{{.RelativePath}}login'" id="BackButton" class="btn-primary">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            <span>ログイン画面に戻る</span>
        </button>

        <p class="footer-text">&copy; 2026 AuthBase Project</p>
    </div>

    <script src="{{.RelativePath}}public/shared/auth.js"></script>
    <script>
        function handleBack() {
            const isPopup = document.getElementById("IsPopup").textContent;
            if (isPopup === "1") {
                window.close();
            } else {
                window.history.back();
            }
        }
    </script>
</body>

</html>
