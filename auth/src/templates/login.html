<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン - AuthBase</title>
    <link rel="stylesheet" href="./public/shared/auth.css">
    <style>
        .hidden {
            display: none !important;
        }
    </style>
</head>

<body class="auth-container">
    <div id="loading-screen" class="auth-card" style="text-align: center;">
        <div class="spinner" style="width: 3rem; height: 3rem; margin: 0 auto 1.5rem;"></div>
        <p class="auth-subtitle">情報を確認しています...</p>
    </div>

    <div id="auth-card-main" class="auth-card hidden">
        <header class="auth-header">
            <div class="auth-logo-wrapper">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                </svg>
            </div>
            <h1 class="auth-title">AuthBase</h1>
            <p id="auth-subtitle" class="auth-subtitle">AuthBaseにログイン</p>
        </header>

        {{if .Error}}
        <div class="error-badge" id="error-message">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="8" x2="12" y2="12"></line>
                <line x1="12" y1="16" x2="12.01" y2="16"></line>
            </svg>
            <span>{{.Error}}</span>
        </div>
        {{end}}

        <div id="social-login-section">
            <div class="social-grid">
                <a href="./oauth/google" class="btn-social">
                    <svg width="18" height="18" viewBox="0 0 48 48">
                        <path fill="#EA4335"
                            d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z" />
                        <path fill="#4285F4"
                            d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z" />
                        <path fill="#FBBC05"
                            d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z" />
                        <path fill="#34A853"
                            d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z" />
                    </svg>
                    Google
                </a>
                <a href="./oauth/github" class="btn-social">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                        <path
                            d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12" />
                    </svg>
                    GitHub
                </a>
            </div>

            <div class="divider">
                <span class="divider-text">またはパスワードで</span>
            </div>
        </div>

        <!-- ログインフォーム -->
        <form id="login-form" onsubmit="handleAuthSubmit(event, './basic/login')">
            <div class="input-group">
                <label class="input-label" for="login-email">メールアドレス</label>
                <input type="email" id="login-email" name="email" required class="input-field"
                    placeholder="name@example.com">
            </div>
            <div class="input-group">
                <label class="input-label" for="login-password">パスワード</label>
                <input type="password" id="login-password" name="password" required class="input-field"
                    placeholder="••••••••">
            </div>
            <button type="submit" class="btn-primary">
                <span>ログイン</span>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                    <polyline points="12 5 19 12 12 19"></polyline>
                </svg>
            </button>
            <div style="text-align: center; margin-top: 1.5rem;">
                <button type="button" onclick="toggleAuth('signup')"
                    style="background: none; border: none; font-size: 0.875rem; font-weight: 700; color: var(--primary); cursor: pointer;">アカウントをお持ちでない方はこちら</button>
            </div>
        </form>

        <!-- 新規登録フォーム -->
        <form id="signup-form" onsubmit="handleAuthSubmit(event, './basic/signup')" class="hidden">
            <div class="input-group">
                <label class="input-label" for="signup-name">お名前</label>
                <input type="text" id="signup-name" name="name" required class="input-field" placeholder="山田 太郎">
            </div>
            <div class="input-group">
                <label class="input-label" for="signup-email">メールアドレス</label>
                <input type="email" id="signup-email" name="email" required class="input-field"
                    placeholder="name@example.com">
            </div>
            <div class="input-group">
                <label class="input-label" for="signup-password">パスワード</label>
                <input type="password" id="signup-password" name="password" required class="input-field"
                    placeholder="••••••••">
            </div>
            <button type="submit" class="btn-primary">
                <span>アカウント作成</span>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                    <polyline points="12 5 19 12 12 19"></polyline>
                </svg>
            </button>
            <div style="text-align: center; margin-top: 1.5rem;">
                <button type="button" onclick="toggleAuth('login')"
                    style="background: none; border: none; font-size: 0.875rem; font-weight: 700; color: var(--primary); cursor: pointer;">すでにアカウントをお持ちの方はこちら</button>
            </div>
        </form>

        <p class="footer-text">&copy; 2026 AuthBase Project</p>
    </div>

    <!-- アプリを開くブリッジ画面 -->
    <div id="bridge-card" class="auth-card hidden" style="text-align: center;">
        <div class="auth-header">
            <div class="auth-logo-wrapper"
                style="background-color: #f0f9ff; color: var(--primary); box-shadow: none; border: 1px solid #e0f2fe;">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
                    <polyline points="15 3 21 3 21 9"></polyline>
                    <line x1="10" y1="14" x2="21" y2="3"></line>
                </svg>
            </div>
            <h1 class="auth-title">ログイン完了</h1>
            <p class="auth-subtitle">正常にログインできました</p>
        </div>

        <div id="user-details" style="background: rgba(240, 249, 255, 0.5); border: 1px solid #bae6fd; border-radius: 1rem; padding: 1.25rem; margin: 1.5rem 0; text-align: left;">
            <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
                <span style="color: var(--text-muted); font-size: 0.75rem; font-weight: 700; text-transform: uppercase;">User</span>
                <span style="font-family: monospace; font-size: 0.875rem;" id="user-name"></span>
            </div>
            <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
                <span style="color: var(--text-muted); font-size: 0.75rem; font-weight: 700; text-transform: uppercase;">ID</span>
                <span style="font-family: monospace; font-size: 0.875rem;" id="user-id"></span>
            </div>
            <div style="display: flex; justify-content: space-between;">
                <span style="color: var(--text-muted); font-size: 0.75rem; font-weight: 700; text-transform: uppercase;">Provider</span>
                <span style="font-family: monospace; font-size: 0.875rem;" id="user-provider"></span>
            </div>
        </div>

        <a id="app-link" href="#" class="btn-primary" style="text-decoration: none;">
            <span>アプリを開く</span>
        </a>

        <div style="margin-top: 1.5rem;">
            <button onclick="logoutAndReload()"
                style="background: none; border: none; font-size: 0.875rem; font-weight: 700; color: var(--text-muted); cursor: pointer;">やり直す</button>
        </div>

        <p class="footer-text">自動的に開かない場合はボタンを押してください</p>
    </div>

    <script src="./public/shared/auth.js"></script>
    <script>
        const isPopupParam = "{{.IsPopup}}";
        const isMobileParam = "{{.IsMobile}}";
        const customScheme = "{{.CustomScheme}}";

        async function init() {
            // ローディングを少し見せる
            await new Promise(r => setTimeout(r, 600));

            const token = localStorage.getItem('token');
            const isValid = await verifyToken(token);

            if (isValid) {
                if (isPopupParam === "1") {
                    if (window.opener) window.opener.postMessage("Login-Success", "*");
                    window.close(); return;
                }

                showBridge();
                return;
            }

            // 未ログイン時：ログインフォームを表示
            document.getElementById('loading-screen').classList.add('hidden');
            document.getElementById('auth-card-main').classList.remove('hidden');
        }

        async function verifyToken(token) {
            if (!token) return false;
            try {
                const response = await fetch('./me', { headers: { 'Authorization': token } });
                return response.ok;
            } catch (e) { return false; }
        }

        async function showBridge() {
            const token = localStorage.getItem('token');
            const url = isMobileParam === "1" ? `${customScheme}://?token=${token}` : '/statics/home.html';

            // ユーザー情報の取得
            try {
                const response = await fetch('./me', { headers: { 'Authorization': token } });
                if (response.ok) {
                    const user = await response.json();
                    const userId = user.user_id || 'N/A';
                    document.getElementById('user-id').textContent = userId.length > 8 ? userId.substring(0, 8) + '...' : userId;
                    document.getElementById('user-name').textContent = user.name || 'N/A';
                    document.getElementById('user-provider').textContent = user.prov_code || 'N/A';
                }
            } catch (e) { console.error('Failed to fetch user', e); }

            document.getElementById('loading-screen').classList.add('hidden');
            document.getElementById('bridge-card').classList.remove('hidden');
            document.getElementById('app-link').href = url;

            // 自動遷移試行
            if (!sessionStorage.getItem('justLoggedIn')) {
                window.location.href = url;
            } else {
                sessionStorage.removeItem('justLoggedIn');
            }
        }

        function toggleAuth(target) {
            const loginForm = document.getElementById('login-form');
            const signupForm = document.getElementById('signup-form');
            const subtitle = document.getElementById('auth-subtitle');
            const social = document.getElementById('social-login-section');

            if (target === 'signup') {
                loginForm.classList.add('hidden');
                signupForm.classList.remove('hidden');
                subtitle.innerText = '新しいアカウントを作成しましょう';
                social.classList.add('hidden');
            } else {
                loginForm.classList.remove('hidden');
                signupForm.classList.add('hidden');
                subtitle.innerText = 'AuthBaseにログイン';
                social.classList.remove('hidden');
            }
        }

        window.onload = init;
    </script>
</body>

</html>
