<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン - AuthBase</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 3px solid #3b82f6;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .fade-in {
            animation: fadeIn 0.5s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

    <!-- 状態1：確認中および自動起動試行中 -->
    <div id="loading" class="flex flex-col items-center space-y-4">
        <div class="spinner"></div>
        <p class="text-slate-600 font-medium">ログイン情報を確認しています...</p>
    </div>

    <!-- 状態2：手動起動画面 -->
    <div id="open-app-content" class="hidden fade-in bg-white p-8 rounded-2xl shadow-xl shadow-slate-200 text-center w-full max-w-md border border-slate-100">
        <div class="mb-6 flex justify-center">
            <div class="w-16 h-16 bg-blue-50 rounded-full flex items-center justify-center">
                <svg class="w-8 h-8 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"></path>
                </svg>
            </div>
        </div>
        <h1 class="text-2xl font-bold text-slate-800 mb-3">アプリは起動しましたか？</h1>
        <p class="text-slate-500 mb-8 leading-relaxed">
            <span class="inline-block">自動的に切り替わらない場合は、</span>
            <span class="inline-block">下のボタンをクリックして</span>
            <span class="inline-block">アプリを開いてください。</span>
        </p>
        
        <a id="app-link" href="#" class="block w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-6 rounded-xl transition-all duration-200 transform hover:scale-[1.02] active:scale-[0.98]">
            アプリを開く
        </a>
        
        <button onclick="location.reload()" class="mt-6 text-sm font-medium text-blue-600 hover:text-blue-700 transition-colors">
            もう一度試す
        </button>
    </div>

    <!-- 状態3：ログイン画面 -->
    <div id="login-content" class="hidden fade-in bg-white p-8 rounded-2xl shadow-xl shadow-slate-200 w-full max-w-md border border-slate-100">
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-600 rounded-2xl shadow-lg shadow-blue-200 mb-4">
                <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path>
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-slate-800">AuthBase ログイン</h1>
            <p class="text-slate-500 mt-2">
                <span class="inline-block">認証を完了するために</span>
                <span class="inline-block">ログインしてください</span>
            </p>
        </div>

        <div id="provider-buttons" class="space-y-3">
            <!-- Google -->
            <a href="./oauth/google" data-provider="google" class="hidden oauth-btn items-center justify-center space-x-3 w-full bg-white border border-slate-200 hover:bg-slate-50 py-3 px-4 rounded-xl transition-all duration-200 shadow-sm hover:shadow">
                <svg class="w-5 h-5" viewBox="0 0 48 48">
                    <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                    <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                    <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                    <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                </svg>
                <span class="font-medium text-slate-700">Googleでログイン</span>
            </a>

            <!-- GitHub -->
            <a href="./oauth/github" data-provider="github" class="hidden oauth-btn items-center justify-center space-x-3 w-full bg-[#24292F] hover:bg-[#2c3238] py-3 px-4 rounded-xl transition-all duration-200">
                <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/>
                </svg>
                <span class="font-medium text-white">GitHubでログイン</span>
            </a>

            <!-- Discord -->
            <a href="./oauth/discord" data-provider="discord" class="hidden oauth-btn items-center justify-center space-x-3 w-full bg-[#5865F2] hover:bg-[#4752c4] py-3 px-4 rounded-xl transition-all duration-200">
                <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/>
                </svg>
                <span class="font-medium text-white">Discordでログイン</span>
            </a>

            <!-- Microsoft -->
            <a href="./oauth/microsoftonline" data-provider="microsoftonline" class="hidden oauth-btn items-center justify-center space-x-3 w-full border border-slate-200 hover:bg-slate-50 py-3 px-4 rounded-xl transition-all duration-200">
                <svg class="w-5 h-5" viewBox="0 0 23 23">
                    <path fill="#f3f3f3" d="M0 0h23v23H0z"/><path fill="#f35325" d="M1 1h10v10H1z"/><path fill="#81bc06" d="M12 1h10v10H12z"/><path fill="#05a6f0" d="M1 12h10v10H1z"/><path fill="#ffba08" d="M12 12h10v10H12z"/>
                </svg>
                <span class="font-medium text-slate-700">Microsoftでログイン</span>
            </a>

            <!-- エラー表示用 -->
            <div id="no-providers" class="hidden text-center py-4 px-4 bg-red-50 border border-red-100 rounded-xl">
                <p class="text-sm text-red-600 font-medium">利用可能なログイン方法がありません</p>
            </div>
        </div>

        <div class="mt-8 pt-6 border-t border-slate-100 text-center">

        <div class="mt-8 pt-6 border-t border-slate-100 text-center">
            <p class="text-xs text-slate-400">
                &copy; 2026 AuthBase. All rights reserved.
            </p>
        </div>
    </div>

    <script>
        const isPopupParam = "{{.IsPopup}}";
        const isMobileParam = "{{.IsMobile}}";
        const customScheme = "{{.CustomScheme}}";

        const elLoading = document.getElementById('loading');
        const elLogin = document.getElementById('login-content');
        const elOpenApp = document.getElementById('open-app-content');

        function hideAll() {
            elLoading.classList.add('hidden');
            elLogin.classList.add('hidden');
            elOpenApp.classList.add('hidden');
            elLoading.classList.remove('flex');
        }

        function isMobile() {
            return isMobileParam === "1";
        }

        async function verifyToken(token) {
            if (!token) return false;
            try {
                const response = await fetch('./me', {
                    headers: { 'Authorization': token }
                });
                return response.ok;
            } catch (e) {
                return false;
            }
        }

        async function fetchProviders() {
            try {
                const response = await fetch('./login/providers');
                if (!response.ok) return [];
                return await response.json();
            } catch (e) {
                console.error("Failed to fetch providers:", e);
                return [];
            }
        }

        function showLogin(enabledProviders) {
            hideAll();
            elLogin.classList.remove('hidden');
            
            let visibleCount = 0;
            const buttons = document.querySelectorAll('.oauth-btn');
            
            buttons.forEach(btn => {
                const provider = btn.getAttribute('data-provider');
                if (enabledProviders.includes(provider)) {
                    btn.classList.remove('hidden');
                    btn.classList.add('flex');
                    visibleCount++;

                    // モバイル対応のURL調整
                    if (isMobile()) {
                        const href = btn.getAttribute('href');
                        btn.href = href + (href.includes('?') ? '&' : '?') + 'ismobile=1';
                    }
                } else {
                    btn.classList.add('hidden');
                    btn.classList.remove('flex');
                }
            });

            if (visibleCount === 0) {
                document.getElementById('no-providers').classList.remove('hidden');
            }
        }

        async function init() {
            // 検証前に少し待機（視覚的安定性のため）
            await new Promise(resolve => setTimeout(resolve, 600));

            const token = localStorage.getItem('token');
            const isValid = await verifyToken(token);

            if (isValid) {
                // ... (既存のログイン済み処理)
                if (isPopupParam === "1") {
                    if (window.opener) {
                        window.opener.postMessage("Login-Success", "*");
                    }
                    window.close();
                    return;
                }

                if (isMobile()) {
                    const url = customScheme + "://?token=" + token;
                    document.getElementById('app-link').href = url;

                    // ログイン直後（sessionStorageにフラグがある）の場合は自動起動しない
                    const justLoggedIn = sessionStorage.getItem('justLoggedIn');
                    if (justLoggedIn) {
                        sessionStorage.removeItem('justLoggedIn');
                        // 自動起動はせず、手動起動画面を表示する
                        hideAll();
                        elOpenApp.classList.remove('hidden');
                    } else {
                        // すでにログイン済みで再訪問した場合は自動起動を試行
                        window.location.href = url;
                        setTimeout(() => {
                            hideAll();
                            elOpenApp.classList.remove('hidden');
                        }, 1500);
                    }
                    return;
                }

                hideAll();
                window.location.href = '/statics/home.html';
                return;
            } else {
                if (token) localStorage.removeItem('token');
            }

            // 有効なプロバイダーを取得して表示
            const enabledProviders = await fetchProviders();
            showLogin(enabledProviders);
        }

        window.onload = init;
    </script>
</body>
</html>
