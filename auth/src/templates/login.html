<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン - {{.AppName}}</title>
    <link rel="stylesheet" href="./public/shared/auth.css">
</head>

<body>

    <!-- 1. 初期ローディング画面 -->
    <div id="loading-screen" class="auth-card" style="text-align:center">
        <div class="spinner" style="margin:12px auto 20px; width:40px; height:40px;"></div>
        <div class="wordmark" style="font-size:16px">情報を確認しています</div>
        <div class="tagline" style="font-size:12px">安全なセッションを確立中...</div>
    </div>

    <!-- 2. メイン認証画面 -->
    <div id="auth-card-main" class="auth-card hidden">
        <div class="wordmark">{{.AppName}}</div>
        <p class="tagline" id="ui-subtitle">続行するにはログインしてください</p>

        <div id="social-area" class="social-area hidden">
            <div id="social-grid" class="social-grid"></div>
        </div>

        <div id="auth-divider" class="divider hidden">
            <span class="divider-text">またはメールで続行</span>
        </div>

        <div id="basic-auth-area" class="hidden">
            <form id="login-form" onsubmit="handleAuthSubmit(event, './basic/login')">
                <div class="form-group">
                    <input type="email" name="email" class="input-field" placeholder="メールアドレス" required
                        autocomplete="email">
                </div>
                <div class="form-group">
                    <input type="password" name="password" class="input-field" placeholder="パスワード" required
                        autocomplete="current-password">
                </div>
                <button type="submit" class="btn-primary">ログイン</button>
                <a href="#" class="link-text" onclick="toggleAuth('signup')">アカウントを作成</a>
            </form>

            <form id="signup-form" class="hidden" onsubmit="handleAuthSubmit(event, './basic/signup')">
                <div class="form-group">
                    <input type="text" name="name" class="input-field" placeholder="お名前" required>
                </div>
                <div class="form-group">
                    <input type="email" name="email" class="input-field" placeholder="メールアドレス" required
                        autocomplete="email">
                </div>
                <div class="form-group">
                    <input type="password" name="password" class="input-field" placeholder="パスワード" required
                        autocomplete="new-password">
                </div>
                <button type="submit" class="btn-primary">アカウント作成</button>
                <a href="#" class="link-text" onclick="toggleAuth('login')">既存のアカウントでログイン</a>
            </form>
        </div>
    </div>

    <!-- 3. ログイン済み画面 (ブリッジ画面) -->
    <div id="bridge-card" class="auth-card hidden">
        <div class="wordmark" style="text-align:left">ログイン完了</div>
        <p class="tagline" style="text-align:left; margin-bottom:24px;">アプリの準備が整いました</p>

        <div class="info-panel">
            <div class="info-row"><span class="info-label">メールアドレス</span><span class="info-value" id="u-email"></span>
            </div>
            <div class="info-row"><span class="info-label">ユーザー名前</span><span class="info-value" id="u-name"></span>
            </div>
            <div class="info-row"><span class="info-label">ログイン方法</span><span class="info-value" id="u-provider"></span>
            </div>
        </div>

        <div style="display: flex; gap: 10px; margin-top: 20px;">
            <a id="app-link-mobile" href="#" class="btn-primary"
                style="flex: 1; text-align: center; padding: 12px 0;">アプリに戻る</a>
            <a id="app-link" href="{{.LoginRedirectURL}}" class="btn-primary"
                style="flex: 1; text-align: center; padding: 12px 0;">Webで開く</a>
        </div>
        <button onclick="handleLogout()" class="btn-outline" style="width: 100%; margin-top: 10px;">ログアウト</button>
    </div>

    <script src="./public/shared/auth.js"></script>
    <script>
        const customScheme = "{{.CustomScheme}}";
        const loginRedirectURL = "{{.LoginRedirectURL}}";
        const isMobile = {{.IsMobile }} || JSON.parse(sessionStorage.getItem('isMobile') || 'false');
        const isPopup = {{.IsPopup }} || JSON.parse(sessionStorage.getItem('isPopup') || 'false');

        // クリック時にストレージをクリア
        function clearSettings() {
            sessionStorage.removeItem('isMobile');
            sessionStorage.removeItem('isPopup');
        }

        document.getElementById('app-link-mobile').addEventListener('click', clearSettings);
        document.getElementById('app-link').addEventListener('click', clearSettings);

        async function handleLogout() {
            try {
                const token = localStorage.getItem('token');
                await fetch("./logout", {
                    headers: { 'Authorization': token },
                    method: 'POST'
                });
                localStorage.removeItem('token');
                window.location.reload();
            } catch (err) {
                console.error('Logout failed:', err);
                alert('ログアウトに失敗しました');
            }
        }

        const providerIcons = {
            google: `<svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>`,
            github: `<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg>`,
            microsoftonline: `<svg width="18" height="18" viewBox="0 0 23 23"><path fill="#f35325" d="M1 1h10v10H1z"/><path fill="#81bc06" d="M12 1h10v10H12z"/><path fill="#05a6f0" d="M1 12h10v10H1z"/><path fill="#ffba08" d="M12 12h10v10H12z"/></svg>`,
            discord: `<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.3698a19.7913 19.7913 0 00-4.8851-1.5152.0744.0744 0 00-.0785.0371c-.211.3753-.4447.8648-.6083 1.2495-1.8447-.2762-3.68-.2762-5.4868 0-.1636-.3939-.407-.8835-.6196-1.2495a.0707.0707 0 00-.0785-.0371 19.735 19.735 0 00-4.8852 1.5152.0699.0699 0 00-.0322.0277C.5334 9.0458-.319 13.5799.0992 18.0578a.0824.0824 0 00.0312.0561c2.098 1.5418 4.143 2.4814 6.127 3.0828a.068.068 0 00.0719-.024c.4656-.636.8856-1.3092 1.2586-2.0152a.0704.0704 0 00-.0381-.097c-1.0772-.4037-2.1072-.8874-3.085-1.4485a.0682.0682 0 01-.0068-.1127c.205-.1527.4103-.3104.6075-.4727a.0686.0686 0 01.0743-.0083c3.856 1.7648 8.0194 1.7648 11.834 0a.0686.0686 0 01.0744.0083c.1972.1623.4025.32.6075.4727a.0682.0682 0 01-.0068.1127 12.28 12.28 0 01-3.085 1.4485.0704.0704 0 00-.0381.097c.373.706.793 1.3792 1.2586 2.0152a.068.068 0 00.0719.024c1.984-.6014 4.029-1.541 6.127-3.0828a.0824.0824 0 00.0312-.0561c.4777-5.0792-.375-9.6133-3.693-13.6608a.0707.0707 0 00-.0322-.0277zM8.02 15.3312c-1.1825 0-2.1569-1.0857-2.1569-2.419 0-1.3332.9555-2.4189 2.1569-2.4189 1.2108 0 2.1757 1.0957 2.1568 2.4189 0 1.3333-.9555 2.419-2.1568 2.419zm7.9748 0c-1.1825 0-2.1569-1.0857-2.1569-2.419 0-1.3332.9555-2.4189 2.1569-2.4189 1.2108 0 2.1757 1.0957 2.1568 2.4189 0 1.3333-.9555 2.419-2.1568 2.419z"/></svg>`
        };

        function toggleAuth(target) {
            const login = document.getElementById('login-form');
            const signup = document.getElementById('signup-form');
            const sub = document.getElementById('ui-subtitle');
            const social = document.getElementById('social-area');
            const divider = document.getElementById('auth-divider');

            if (target === 'signup') {
                login.classList.add('hidden');
                signup.classList.remove('hidden');
                sub.innerText = '新しいアカウントを作成しましょう';
                social.classList.add('hidden');
                if (divider) divider.classList.add('hidden');
            } else {
                login.classList.remove('hidden');
                signup.classList.add('hidden');
                sub.innerText = '続行するにはログインしてください';
                if (document.getElementById('social-grid').children.length > 0) {
                    social.classList.remove('hidden');
                    if (divider) divider.classList.remove('hidden');
                }
            }
        }

        async function setupProviders() {
            try {
                const response = await fetch('./login/providers');
                const rawProviders = await response.json();
                const providers = [...new Set(rawProviders)];

                const socialGrid = document.getElementById('social-grid');
                const socialArea = document.getElementById('social-area');
                const basicArea = document.getElementById('basic-auth-area');
                const divider = document.getElementById('auth-divider');

                let oAuthCount = 0;
                let hasBasic = false;

                providers.forEach(provider => {
                    const name = provider.toLowerCase();
                    if (name === 'basic') {
                        hasBasic = true;
                    } else if (providerIcons[name]) {
                        oAuthCount++;
                        const btn = document.createElement('button');
                        btn.className = 'btn-outline';

                        // 表示名の調整: microsoftonline -> Microsoft
                        const displayName = name === 'microsoftonline' ? 'Microsoft' : provider.charAt(0).toUpperCase() + provider.slice(1);

                        btn.innerHTML = `${providerIcons[name]} <span>${displayName}</span>`;
                        btn.onclick = () => window.location.href = `./oauth/${name}`;
                        socialGrid.appendChild(btn);
                    }
                });

                if (oAuthCount >= 2) socialGrid.classList.add('multi');
                if (oAuthCount > 0) socialArea.classList.remove('hidden');
                if (hasBasic) basicArea.classList.remove('hidden');
                if (oAuthCount > 0 && hasBasic) divider.classList.remove('hidden');
            } catch (err) {
                console.error('Failed to load providers:', err);
                document.getElementById('basic-auth-area').classList.remove('hidden');
            }
        }

        async function init() {
            const token = localStorage.getItem('token');
            const loading = document.getElementById('loading-screen');
            const main = document.getElementById('auth-card-main');
            const bridge = document.getElementById('bridge-card');

            // 設定を保存
            sessionStorage.setItem('isMobile', JSON.stringify(isMobile));
            sessionStorage.setItem('isPopup', JSON.stringify(isPopup));

            // UIの状態を再調整
            if (isMobile) {
                document.getElementById('app-link-mobile').style.display = 'block';
                document.getElementById('app-link').style.display = 'none';
            } else {
                document.getElementById('app-link-mobile').style.display = 'none';
                document.getElementById('app-link').style.display = 'block';
            }

            await setupProviders();

            const urlParams = new URLSearchParams(window.location.search);
            const redirectUrl = urlParams.get('redirect_uri');

            if (token) {
                const user = await fetch("./me", {
                    headers: { 'Authorization': token },
                    method: 'GET'
                });

                if (user.status === 200) {
                    const userData = await user.json();
                    document.getElementById('u-name').innerText = userData.name;
                    document.getElementById('u-email').innerText = userData.email;
                    document.getElementById('u-provider').textContent = userData.prov_code;

                    if (isMobile) {
                        const bridgeResp = await fetch("./bridge/issue", {
                            headers: { 'Authorization': token },
                            method: 'POST'
                        });
                        if (bridgeResp.ok) {
                            const bridgeData = await bridgeResp.json();
                            const bridgeToken = bridgeData.bridge_token;
                            const mobileLink = document.getElementById('app-link-mobile');
                            const callbackScheme = `${customScheme}://callback`;
                            mobileLink.href = redirectUrl ?
                                `${callbackScheme}?bridge_token=${bridgeToken}&next=${encodeURIComponent(redirectUrl)}` :
                                `${callbackScheme}?bridge_token=${bridgeToken}`;

                            // 自動遷移は行わない
                        }
                    } else {
                        // Web環境の場合自動遷移を試みる
                        window.location.href = loginRedirectURL;
                    }
                    bridge.classList.remove('hidden');
                    loading.classList.add('hidden');
                    return;
                }
            }

            main.classList.remove('hidden');
            loading.classList.add('hidden');
        }

        window.onload = init;
    </script>
</body>

</html>
