<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>認証完了 - AuthBase</title>
    <link rel="stylesheet" href="../../../public/shared/auth.css">
</head>

<body class="auth-container">
    <div class="auth-card" style="text-align: center;">
        <div class="auth-header">
            <div class="auth-logo-wrapper">
                <div class="spinner" style="width: 2.5rem; height: 2.5rem; border-width: 4px;"></div>
            </div>
            <h1 class="auth-title">認証を処理中</h1>
            <p class="auth-subtitle">安全にアカウントへ接続しています</p>
        </div>

        <div style="display: none;" id="token">{{index . "token"}}</div>
        <div style="display: none;" id="isPopup">{{index . "isPopup"}}</div>
        <div style="display: none;" id="isMobile">{{index . "isMobile"}}</div>

        <p class="footer-text">まもなくリダイレクトされます...</p>
    </div>

    <script src="../../../public/shared/auth.js"></script>
    <script>
        const token = document.getElementById('token').textContent;
        const isPopup = document.getElementById('isPopup').textContent;
        const isMobile = document.getElementById('isMobile').textContent;

        if (token && token !== "<no value>") {
            localStorage.setItem('token', token);
            sessionStorage.setItem('justLoggedIn', 'true');
        }

        setTimeout(function () {
            if (isPopup === "1") {
                if (window.opener) {
                    window.opener.postMessage("Login-Success", "*");
                }
                window.close();
                return;
            }

            // ベースパスが変わる可能性を考慮
            let redirectUrl = "../../../login";
            const params = [];
            if (isMobile === "1") params.push("ismobile=1");
            if (isPopup === "1") params.push("ispopup=1");

            if (params.length > 0) {
                redirectUrl += "?" + params.join("&");
            }

            window.location.href = redirectUrl;
        }, 800);
    </script>
</body>

</html>
