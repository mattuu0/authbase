<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>アプリを開く - AuthBase</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
            width: 100%;
            max-width: 400px;
        }
        h1 { color: #1c1e21; font-size: 1.5rem; margin-top: 0; }
        p { color: #606770; margin-bottom: 2rem; }
        .btn {
            display: inline-block;
            background-color: #007bff;
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 4px;
            text-decoration: none;
            font-weight: bold;
        }
        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: #007bff;
            animation: spin 1s linear infinite;
            margin: 0 auto 1.5rem;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
    <script>
        window.onload = function() {
            const token = localStorage.getItem('token');
            const customScheme = "{{.CustomScheme}}";
            
            if (token) {
                const url = customScheme + "://?token=" + token;
                
                // ボタンのリンクを先に更新
                document.getElementById('app-link').href = url;

                // 視覚的な確認のために少し待機してから自動リダイレクト
                setTimeout(function() {
                    window.location.href = url;
                }, 800);
            } else {
                // トークンがない場合はログイン画面へ
                window.location.href = './login';
            }
        };
    </script>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h1>アプリを起動しています</h1>
        <p>自動的に切り替わらない場合は、下のボタンをクリックしてください。</p>
        <a id="app-link" href="#" class="btn">アプリを開く</a>
    </div>
</body>
</html>
