            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"
        "401":
          description: 未認証
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ----------------------------------------------------------
  # 管理者 - ログアウト
