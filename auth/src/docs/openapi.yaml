  # ----------------------------------------------------------
  # 管理者API - ユーザー作成
  # ----------------------------------------------------------
  /api/user:
    post:
      summary: ユーザーを作成する（管理者）
      description: 管理者がBasic認証ユーザーを作成します。
      operationId: adminCreateUser
      tags: [AdminUser]
      security:
        - AdminCookieSession: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name:
                  type: string
                  example: "山田太郎"
                email:
                  type: string
                  format: email
                  example: "yamada@example.com"
                password:
                  type: string
                  format: password
                  example: "P@ssw0rd!"
      responses:
        "201":
          description: ユーザー作成成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: リクエスト不正
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: 未認証
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: サーバーエラー（メールアドレス重複含む）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    put:
      summary: ユーザーを更新する（管理者）
      description: ユーザーの名前・ラベル・アイコン（Base64）を更新します。
      operationId: adminUpdateUser
      tags: [AdminUser]
      security:
        - AdminCookieSession: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id]
              properties:
                id:
                  type: string
                  example: "01HXXXXXXXXXXXXXXXXXXXXXXXXX"
                name:
                  type: string
                  example: "山田花子"
                avatar:
                  type: string
                  description: "Base64エンコードされた画像データ（`data:image/png;base64,...`）"
                  example: "data:image/png;base64,iVBORw0KGgo..."
                labels:
                  type: array
                  items:
                    type: string
                  example: ["premium"]
      responses:
        "200":
          description: 更新後のユーザー情報
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: リクエスト不正
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: 未認証
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: サーバーエラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    delete:
      summary: ユーザーを削除する（管理者）
      description: |
        `userid` ヘッダーで指定したユーザーを削除します。
        アイコン画像ファイルも同時に削除されます。
      operationId: adminDeleteUser
      tags: [AdminUser]
      security:
        - AdminCookieSession: []
      parameters:
        - name: userid
          in: header
          required: true
          schema:
            type: string
          example: "01HXXXXXXXXXXXXXXXXXXXXXXXXX"
      responses:
        "200":
          description: 削除成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: string
                    example: "success"
        "401":
          description: 未認証
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: サーバーエラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ----------------------------------------------------------
