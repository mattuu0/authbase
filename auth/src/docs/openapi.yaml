  /api/user/ban:
    put:
      summary: ユーザーのBANを切り替える
      operationId: toggleBan
      tags: [AdminUser]
      security:
        - AdminCookieSession: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [IsBanned, UserID]
              properties:
                IsBanned:
                  type: boolean
                  description: trueでBAN、falseでBAN解除
                  example: true
                UserID:
                  type: string
                  example: "01HXXXXXXXXXXXXXXXXXXXXXXXXX"
      responses:
        "200":
          description: 更新後のユーザー情報
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: リクエスト不正
          content:
